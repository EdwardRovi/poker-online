<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker — Texas Hold'em</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #150508;
  --felt: #1a0a0a;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --red2: #e74c3c;
  --text: #f5ead8;
  --muted: rgba(245,234,216,0.45);
  --border: rgba(201,168,76,0.25);
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Cinzel',serif; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(60,10,10,0.6) 0%,transparent 70%); z-index:0; }

/* LOBBY */
#lobby { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; background:radial-gradient(ellipse 100% 100% at 50% 40%,#2a0a0d 0%,#0a0305 100%); }
.title-suits { text-align:center; font-size:1.6rem; letter-spacing:0.5rem; margin-bottom:0.5rem; }
.title-suits span:nth-child(2),.title-suits span:nth-child(3) { color:var(--red2); }
.title-main { font-family:'Cinzel Decorative',cursive; font-size:3.5rem; font-weight:700; color:var(--gold2); letter-spacing:0.12em; text-align:center; text-shadow:0 0 40px rgba(201,168,76,0.4); }
.title-sub { font-size:0.75rem; color:var(--muted); letter-spacing:0.3em; margin:0.4rem 0 2rem; text-align:center; }
.panel { background:rgba(0,0,0,0.5); border:1px solid var(--border); border-radius:8px; padding:1.8rem; width:330px; box-shadow:0 8px 40px rgba(0,0,0,0.6); }
.panel h2 { font-family:'Cinzel Decorative',cursive; font-size:0.85rem; color:var(--gold); text-align:center; letter-spacing:0.15em; margin-bottom:1.2rem; }
.fg { margin-bottom:0.8rem; }
.fg label { display:block; font-size:0.62rem; color:var(--muted); letter-spacing:0.12em; margin-bottom:0.3rem; }
.fg input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2); color:var(--text); font-family:'Cinzel',serif; font-size:0.85rem; padding:0.5rem 0.7rem; border-radius:4px; outline:none; }
.fg input:focus { border-color:rgba(201,168,76,0.5); }
.btn { width:100%; padding:0.62rem; border:none; border-radius:4px; cursor:pointer; font-family:'Cinzel Decorative',cursive; font-size:0.65rem; letter-spacing:0.12em; transition:all 0.15s; margin-top:0.4rem; }
.btn-gold { background:linear-gradient(135deg,#b8860b,#c9a84c,#e8c97a,#c9a84c); color:#1a0f00; }
.btn-gold:hover { filter:brightness(1.15); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }
.btn-red { background:rgba(192,57,43,0.3); border:1px solid rgba(192,57,43,0.5); color:#e88; }
.divider { text-align:center; color:var(--muted); font-size:0.65rem; margin:0.7rem 0; letter-spacing:0.2em; }
.room-code { font-family:'Cinzel Decorative',cursive; font-size:2.5rem; color:var(--gold2); text-align:center; letter-spacing:0.2em; margin:0.5rem 0 0.8rem; text-shadow:0 0 20px rgba(201,168,76,0.4); }
.w-list { display:flex; flex-direction:column; gap:0.3rem; margin:0.8rem 0; }
.w-player { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:0.35rem 0.7rem; font-size:0.78rem; display:flex; justify-content:space-between; }

/* GAME */
#game { display:none; position:fixed; inset:0; flex-direction:column; background:var(--felt); }
#game.active { display:flex; }
#game::before { content:''; position:absolute; inset:0; pointer-events:none; background-image:repeating-linear-gradient(45deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 8px),repeating-linear-gradient(-45deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 8px); z-index:0; }
.g-inner { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:0.35rem 1rem; background:rgba(0,0,0,0.45); border-bottom:1px solid rgba(201,168,76,0.12); flex-shrink:0; }
.topbar-title { font-family:'Cinzel Decorative',cursive; font-size:0.65rem; color:var(--gold); letter-spacing:0.15em; }
.topbar-info { font-size:0.6rem; color:var(--muted); }
.exit-btn { background:rgba(100,20,20,0.4); border:1px solid rgba(200,60,60,0.3); color:rgba(220,120,120,0.7); font-family:'Cinzel Decorative',cursive; font-size:0.48rem; letter-spacing:0.06em; padding:0.2rem 0.5rem; border-radius:3px; cursor:pointer; }
.exit-btn:hover { background:rgba(150,30,30,0.6); color:#fff; }

.main-area { flex:1; display:flex; overflow:hidden; }
.table-wrap { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
.table-oval { position:absolute; width:68%; height:70%; max-width:660px; max-height:370px; background:radial-gradient(ellipse at 50% 45%,#7a1a1a 0%,#4f0f0f 50%,#300a0a 100%); border-radius:50%; border:8px solid #2c1a0a; box-shadow:0 0 0 3px #6b4a1a,0 0 0 5px #3d2808,inset 0 0 60px rgba(0,0,0,0.4),0 10px 60px rgba(0,0,0,0.7); }
.center-area { position:absolute; top:50%; left:50%; transform:translate(-50%,-55%); display:flex; flex-direction:column; align-items:center; gap:0.3rem; z-index:2; }
.street-lbl { font-size:0.5rem; color:var(--muted); letter-spacing:0.25em; border:1px solid rgba(255,255,255,0.1); border-radius:2px; padding:0.1rem 0.5rem; }
.comm-cards { display:flex; gap:0.35rem; }
.pot-lbl { font-family:'Cinzel Decorative',cursive; font-size:0.7rem; color:var(--gold2); text-shadow:0 0 10px rgba(201,168,76,0.5); }
#seats { position:absolute; inset:0; z-index:3; }

/* Cards */
.card { width:46px; height:66px; border-radius:5px; position:relative; display:flex; flex-direction:column; justify-content:space-between; padding:3px; font-family:'Cinzel',serif; font-weight:600; box-shadow:0 2px 8px rgba(0,0,0,0.5); flex-shrink:0; transition:transform 0.15s; }
.card.face { background:#fdf8ef; font-size:0.85rem; }
.card.back { background:linear-gradient(135deg,#1a0a3a,#2d1060); border:2px solid rgba(201,168,76,0.3); }
.card.back::after { content:'♠'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:rgba(201,168,76,0.15); }
.card.red { color:#c0392b; }
.card.black { color:#1a1a2e; }
.card-r { font-size:0.65rem; line-height:1; }
.card-s { font-size:0.55rem; line-height:1; }
.card-c { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.1rem; }
.card-rb { transform:rotate(180deg); }
.card.hole { width:54px; height:78px; cursor:default; }
.card.hole:not(.folded):hover { transform:translateY(-5px); }
.card.sm { width:36px; height:52px; font-size:0.6rem; }
.card.sm .card-c { font-size:0.85rem; }
.card.comm { width:40px; height:58px; font-size:0.68rem; }
.card.comm .card-c { font-size:0.95rem; }

/* Seats */
.seat { position:absolute; display:flex; flex-direction:column; align-items:center; gap:2px; }
.seat-box { background:rgba(0,0,0,0.72); border:1px solid rgba(255,255,255,0.1); border-radius:5px; padding:0.22rem 0.5rem; text-align:center; min-width:76px; transition:border-color 0.2s,box-shadow 0.2s; }
.seat-box.is-turn { border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.4); }
.seat-box.folded { opacity:0.35; }
.seat-box.elim { opacity:0.18; }
.s-name { font-size:0.56rem; color:var(--gold2); letter-spacing:0.06em; white-space:nowrap; overflow:hidden; max-width:80px; }
.s-chips { font-size:0.6rem; color:var(--text); }
.s-bet { font-size:0.52rem; color:#7bc47b; }
.s-status { font-size:0.5rem; color:var(--muted); font-style:italic; }
.d-btn { display:inline-block; background:var(--gold); color:#1a0f00; border-radius:50%; width:13px; height:13px; font-size:0.42rem; line-height:13px; text-align:center; font-weight:700; margin-left:2px; }
.s-cards { display:flex; gap:2px; }

/* My area */
.my-area { flex-shrink:0; background:rgba(0,0,0,0.52); border-top:1px solid rgba(201,168,76,0.12); padding:0.5rem 1rem; display:flex; align-items:center; gap:1rem; min-height:110px; }
.my-hand { display:flex; gap:0.45rem; }
.my-meta { display:flex; flex-direction:column; gap:0.12rem; min-width:100px; }
.my-name { font-family:'Cinzel Decorative',cursive; font-size:0.6rem; color:var(--gold2); }
.my-chips { font-size:0.78rem; }
.my-bet { font-size:0.62rem; color:#7bc47b; }
.act-area { flex:1; display:flex; align-items:center; justify-content:flex-end; gap:0.4rem; flex-wrap:wrap; }
.ab { background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.14); color:var(--text); font-family:'Cinzel Decorative',cursive; font-size:0.52rem; letter-spacing:0.07em; padding:0.42rem 0.85rem; border-radius:4px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.ab:hover { background:rgba(255,255,255,0.09); }
.ab.fold { border-color:rgba(200,60,60,0.4); color:rgba(220,120,120,0.8); }
.ab.fold:hover { background:rgba(180,30,30,0.4); color:#fff; }
.ab.call { border-color:rgba(39,174,96,0.5); color:#7bc47b; }
.ab.call:hover { background:rgba(39,174,96,0.2); color:#fff; }
.ab.raise { border-color:rgba(201,168,76,0.5); color:var(--gold2); }
.ab.raise:hover { background:rgba(201,168,76,0.15); color:#fff; }
.ab.allin { border-color:rgba(231,76,60,0.6); color:#e74c3c; }
.ab.allin:hover { background:rgba(231,76,60,0.3); color:#fff; }
.raise-inp { width:78px; background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.3); color:var(--text); font-family:'Cinzel',serif; font-size:0.72rem; padding:0.28rem 0.45rem; border-radius:4px; outline:none; text-align:center; }
.raise-inp:focus { border-color:var(--gold); }
.wait-msg { font-size:0.6rem; color:var(--muted); font-style:italic; }
.turn-msg { font-size:0.58rem; color:var(--gold2); letter-spacing:0.1em; }

/* Sidebar */
.sidebar { width:196px; background:rgba(0,0,0,0.42); border-left:1px solid rgba(201,168,76,0.1); display:flex; flex-direction:column; }
.sidebar h3 { font-family:'Cinzel Decorative',cursive; font-size:0.5rem; color:var(--gold); letter-spacing:0.15em; padding:0.45rem 0.6rem; border-bottom:1px solid rgba(255,255,255,0.06); }
#log { flex:1; overflow-y:auto; padding:0.35rem 0.6rem; display:flex; flex-direction:column; gap:0.18rem; }
.log-e { font-size:0.58rem; color:var(--muted); line-height:1.4; border-bottom:1px solid rgba(255,255,255,0.03); padding-bottom:0.15rem; }
.log-e.hl { color:var(--gold2); }
.chat-box { border-top:1px solid rgba(255,255,255,0.06); padding:0.35rem; flex-shrink:0; }
.chat-msgs { height:55px; overflow-y:auto; margin-bottom:0.25rem; }
.chat-m { font-size:0.56rem; color:var(--muted); }
.chat-m strong { color:var(--text); }
.chat-row { display:flex; gap:0.25rem; }
.chat-row input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--text); font-family:'Cinzel',serif; font-size:0.58rem; padding:0.22rem 0.38rem; border-radius:3px; outline:none; }
.chat-row button { background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); color:var(--gold); font-size:0.6rem; padding:0.22rem 0.38rem; border-radius:3px; cursor:pointer; font-family:sans-serif; }

/* Overlays */
#hand-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:50; display:none; align-items:center; justify-content:center; }
#hand-overlay.vis { display:flex; }
.hand-box { background:linear-gradient(160deg,#0d1f14,#060c10); border:1px solid var(--border); border-radius:10px; padding:1.8rem; width:370px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
.hand-box h2 { font-family:'Cinzel Decorative',cursive; font-size:0.95rem; color:var(--gold2); margin-bottom:0.9rem; }
.w-row { display:flex; justify-content:space-between; align-items:center; padding:0.35rem 0.6rem; background:rgba(39,174,96,0.1); border:1px solid rgba(39,174,96,0.3); border-radius:4px; margin-bottom:0.35rem; }
.w-name { font-size:0.82rem; color:var(--gold2); }
.w-hand { font-size:0.68rem; color:rgba(245,234,216,0.55); }
.w-chips { font-size:0.78rem; color:#7bc47b; }
#gameover-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:60; display:none; align-items:center; justify-content:center; }
#gameover-overlay.vis { display:flex; }
.go-box { text-align:center; }
.go-box h1 { font-family:'Cinzel Decorative',cursive; font-size:2.2rem; color:var(--gold2); margin-bottom:0.5rem; text-shadow:0 0 40px rgba(201,168,76,0.5); }
.go-box p { color:var(--muted); margin-bottom:1.8rem; }
#notice { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:100; pointer-events:none; }
.n-box { background:rgba(0,0,0,0.88); border:1px solid var(--border); border-radius:4px; padding:0.45rem 1.1rem; font-size:0.75rem; color:var(--gold2); white-space:nowrap; opacity:0; transition:opacity 0.3s; font-family:'Cinzel Decorative',cursive; }
.n-box.show { opacity:1; }
</style>
</head>
<body>
<div id="notice"><div class="n-box" id="n-text"></div></div>

<div id="hand-overlay">
  <div class="hand-box">
    <h2>🃏 Fin de la Mano</h2>
    <div id="hand-content"></div>
    <button id="next-btn" class="btn btn-gold" style="margin-top:1rem" onclick="sendNext()">✅ Siguiente mano (0/?)</button>
  </div>
</div>

<div id="gameover-overlay">
  <div class="go-box">
    <h1>🏆 Partida Terminada</h1>
    <p id="go-msg"></p>
    <button class="btn btn-gold" style="width:200px" onclick="exitGame()">Volver al menú</button>
  </div>
</div>

<div id="lobby">
  <div class="title-suits"><span>♠</span><span>♥</span><span>♦</span><span>♣</span></div>
  <div class="title-main">PÓKER</div>
  <div class="title-sub">Texas Hold'em · Fichas virtuales</div>

  <div id="lform" class="panel">
    <h2>Unirse o Crear</h2>
    <div class="fg"><label>Tu nombre</label><input type="text" id="pname" placeholder="Nombre..." maxlength="16"></div>
    <button class="btn btn-gold" onclick="doCreate()">✦ Crear sala</button>
    <div class="divider">— o —</div>
    <div class="fg"><label>Código de sala</label><input type="text" id="rcode" placeholder="XXXX" maxlength="4" style="text-transform:uppercase" onkeydown="if(event.key==='Enter')doJoin()"></div>
    <button class="btn btn-outline" onclick="doJoin()">Unirse</button>
  </div>

  <div id="lwait" class="panel" style="display:none;text-align:center">
    <h2>Sala Creada</h2>
    <div class="room-code" id="wcode">—</div>
    <p style="font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem">Comparte este código · Esperando jugadores</p>
    <div class="w-list" id="wlist"></div>
    <div id="start-area"></div>
    <button class="btn btn-red" style="margin-top:0.5rem;font-size:0.5rem" onclick="exitGame()">🚪 Salir de la sala</button>
  </div>
</div>

<div id="game">
  <div class="g-inner">
    <div class="topbar">
      <div class="topbar-title">♠ TEXAS HOLD'EM</div>
      <div class="topbar-info" id="tinfo">—</div>
      <button class="exit-btn" onclick="exitGame()">🚪 Salir</button>
    </div>
    <div class="main-area">
      <div class="table-wrap">
        <div class="table-oval"></div>
        <div class="center-area">
          <div class="street-lbl" id="slbl">PRE-FLOP</div>
          <div class="comm-cards" id="comm"></div>
          <div class="pot-lbl" id="pot">Bote: 0</div>
        </div>
        <div id="seats"></div>
      </div>
      <div class="sidebar">
        <h3>REGISTRO</h3>
        <div id="log"></div>
        <div class="chat-box">
          <div class="chat-msgs" id="chatmsgs"></div>
          <div class="chat-row">
            <input type="text" id="chatinp" placeholder="Chat..." maxlength="80" onkeydown="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()" style="font-family:sans-serif">▶</button>
          </div>
        </div>
      </div>
    </div>
    <div class="my-area">
      <div class="my-hand" id="myhand"></div>
      <div class="my-meta" id="mymeta"></div>
      <div class="act-area" id="actarea"></div>
    </div>
  </div>
</div>

<script>
const SERVER_URL = `wss://${location.host}`;
let ws=null, myId=null, myRoom=null, gs=null, myName='Jugador', reconnTimer=null;

function connect(cb) {
  if (ws && ws.readyState < 2) { if(cb) cb(); return; }
  ws = new WebSocket(SERVER_URL);
  ws.onopen = () => { if(cb) cb(); };
  ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(err){console.error(err);} };
  ws.onerror = () => {};
  ws.onclose = () => { if(myRoom) reconnTimer = setTimeout(()=>connect(()=>send({type:'joinRoom',code:myRoom,name:myName})),3000); };
}
function send(o) { if(ws && ws.readyState===1) ws.send(JSON.stringify(o)); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doCreate() {
  myName = document.getElementById('pname').value.trim()||'Jugador';
  connect(()=>send({type:'createRoom',name:myName,maxPlayers:9}));
}
function doJoin() {
  myName = document.getElementById('pname').value.trim()||'Jugador';
  const code = document.getElementById('rcode').value.trim().toUpperCase();
  if(!code){alert('Introduce el código');return;}
  connect(()=>send({type:'joinRoom',code,name:myName}));
}
function exitGame() {
  myId=null; myRoom=null; gs=null;
  if(reconnTimer){clearTimeout(reconnTimer);reconnTimer=null;}
  if(ws){ws.onclose=null;ws.close();ws=null;}
  document.getElementById('game').classList.remove('active');
  document.getElementById('lobby').style.display='flex';
  document.getElementById('lform').style.display='block';
  document.getElementById('lwait').style.display='none';
  document.getElementById('hand-overlay').classList.remove('vis');
  document.getElementById('gameover-overlay').classList.remove('vis');
}

let ntimer=null;
function notice(msg,dur=2500) {
  const el=document.getElementById('n-text');
  el.textContent=msg; el.classList.add('show');
  if(ntimer) clearTimeout(ntimer);
  ntimer=setTimeout(()=>el.classList.remove('show'),dur);
}

function isRed(s){return s==='♥'||s==='♦';}
function mkCard(c,extra='',size='') {
  if(!c) return `<div class="card back ${size}"></div>`;
  const cl=isRed(c.suit)?'red':'black';
  return `<div class="card face ${cl} ${size} ${extra}">
    <div><div class="card-r">${esc(c.rank)}</div><div class="card-s">${esc(c.suit)}</div></div>
    <div class="card-c">${esc(c.suit)}</div>
    <div style="align-self:flex-end"><div class="card-r card-rb">${esc(c.rank)}</div><div class="card-s card-rb">${esc(c.suit)}</div></div>
  </div>`;
}

// Seat positions around oval (% of table-wrap)
function seatPos(n, i) {
  // Distribute opponents around oval, bottom = my position (index 0 = me, 1..n-1 = opponents)
  const all = [
    {bottom:'5%',left:'50%',transform:'translateX(-50%)'},
    {bottom:'18%',left:'10%'},
    {top:'28%',left:'5%'},
    {top:'8%',left:'20%'},
    {top:'2%',left:'50%',transform:'translateX(-50%)'},
    {top:'8%',right:'20%'},
    {top:'28%',right:'5%'},
    {bottom:'18%',right:'10%'},
    {bottom:'35%',right:'22%'},
  ];
  return all[i] || all[0];
}

function renderGame(state) {
  if(!state) return;
  const streets={preflop:'PRE-FLOP',flop:'FLOP',turn:'TURN',river:'RIVER',showdown:'SHOWDOWN'};
  document.getElementById('tinfo').textContent=`Mano ${state.round} · ${streets[state.street]||state.street} · Blinds ${state.smallBlind}/${state.bigBlind}`;
  document.getElementById('slbl').textContent=streets[state.street]||state.street;

  // Community
  const commEl=document.getElementById('comm');
  commEl.innerHTML = state.community&&state.community.length
    ? state.community.map(c=>mkCard(c,'','comm')).join('')
    : '<div style="color:rgba(255,255,255,0.12);font-size:0.62rem;letter-spacing:0.2em">Esperando...</div>';
  document.getElementById('pot').textContent=`Bote: ${state.pot}`;

  // Seats (opponents)
  const me = state.players[state.myIdx];
  const others = state.players.map((p,i)=>({...p,origIdx:i})).filter((_,i)=>i!==state.myIdx);
  const seatsEl=document.getElementById('seats');
  seatsEl.innerHTML = others.map((p,i)=>{
    const pos=seatPos(others.length+1,i+1);
    const style=Object.entries(pos).map(([k,v])=>`${k}:${v}`).join(';');
    const isTurn=p.origIdx===state.currentTurn;
    const foldedCls=p.folded?'folded':p.eliminated?'elim':isTurn?'is-turn':'';
    const dTag=p.isDealer?'<span class="d-btn">D</span>':'';
    const betStr=p.bet>0?`<div class="s-bet">Apuesta: ${p.bet}</div>`:'';
    const status=p.folded?'Retirado':p.allIn?'🔴 ALL-IN':p.eliminated?'Eliminado':'';
    let cards='';
    if(p.hand&&p.hand.length) cards=p.hand.map(c=>mkCard(c,'','sm')).join('');
    else cards=Array(p.cardCount||0).fill('<div class="card back sm"></div>').join('');
    return `<div class="seat" style="position:absolute;${style}">
      <div class="seat-box ${foldedCls}">
        <div class="s-name">${esc(p.name)}${dTag}</div>
        <div class="s-chips">💰 ${p.chips}</div>
        ${betStr}
        ${status?`<div class="s-status">${status}</div>`:''}
      </div>
      <div class="s-cards">${cards}</div>
    </div>`;
  }).join('');

  // My hand
  const myHand=document.getElementById('myhand');
  myHand.innerHTML = (me&&me.hand&&me.hand.length&&!me.folded)
    ? me.hand.map(c=>mkCard(c,'hole')).join('')
    : (me&&me.folded?'<div style="font-size:0.65rem;color:rgba(220,120,120,0.5)">Retirado</div>':'');

  // My meta
  const myMeta=document.getElementById('mymeta');
  if(me){
    const dTag=me.isDealer?'<span class="d-btn">D</span>':'';
    myMeta.innerHTML=`
      <div class="my-name">${esc(me.name)}${dTag}</div>
      <div class="my-chips">💰 ${me.chips} fichas</div>
      ${me.bet>0?`<div class="my-bet">Apuesta actual: ${me.bet}</div>`:''}
      ${me.allIn?'<div style="color:#e74c3c;font-size:0.58rem">🔴 ALL-IN</div>':''}
    `;
  }

  renderActions(state);
}

function renderActions(state) {
  const actEl=document.getElementById('actarea');
  const me=state.players[state.myIdx];
  const isMyTurn=state.myIdx===state.currentTurn&&state.gameState==='playing'&&me&&!me.folded&&!me.allIn;
  if(!isMyTurn){
    const cur=state.players[state.currentTurn];
    actEl.innerHTML=cur?`<div class="wait-msg">Turno de ${esc(cur.name)}...</div>`:'';
    return;
  }
  const canCheck=(me.bet||0)>=state.currentBet;
  const toCall=state.currentBet-(me.bet||0);
  const minR=state.currentBet+(state.minRaise||state.bigBlind);
  const maxR=me.chips+(me.bet||0);
  actEl.innerHTML=`
    <div class="turn-msg">⭐ TU TURNO</div>
    <button class="ab fold" onclick="doAct('fold')">Retirarse</button>
    ${canCheck
      ?`<button class="ab call" onclick="doAct('check')">Pasar</button>`
      :`<button class="ab call" onclick="doAct('call')">Igualar ${toCall}</button>`}
    ${!me.allIn&&me.chips>toCall?`
      <input class="raise-inp" id="ramt" type="number" value="${Math.min(minR,maxR)}" min="${minR}" max="${maxR}" step="${state.bigBlind}">
      <button class="ab raise" onclick="doRaise()">Subir</button>`:''}
    ${me.chips>0?`<button class="ab allin" onclick="doAct('allin')">All-In (${me.chips})</button>`:''}
  `;
}

function doAct(a){send({type:'action',action:a});}
function doRaise(){const a=parseInt(document.getElementById('ramt')?.value||0);send({type:'action',action:'raise',amount:a});}

function renderWaiting(state){
  document.getElementById('wlist').innerHTML=state.players.map(p=>`
    <div class="w-player"><span>${esc(p.name)}</span><span style="color:var(--muted);font-size:0.7rem">${p.isYou?'(Tú)':'💰 1,000'}</span></div>
  `).join('');
  const me=state.players.find(p=>p.isYou);
  const isHost=me&&state.players.indexOf(me)===0;
  const sa=document.getElementById('start-area');
  if(isHost&&state.players.length>=2) sa.innerHTML=`<button class="btn btn-gold" style="margin-top:0.5rem" onclick="send({type:'startGame'})">▶ Iniciar (${state.players.length} jugadores)</button>`;
  else if(isHost) sa.innerHTML=`<div style="font-size:0.65rem;color:var(--muted);margin-top:0.5rem">Necesitas al menos 2 jugadores</div>`;
  else sa.innerHTML=`<div style="font-size:0.65rem;color:var(--muted);margin-top:0.5rem">El anfitrión iniciará la partida</div>`;
}

function renderHandEnd(data){
  const box=document.getElementById('hand-content');
  const active=gs?gs.players.filter(p=>!p.eliminated).length:2;
  box.innerHTML=(data.winners||[]).map(w=>`
    <div class="w-row"><div class="w-name">${esc(w.name)}</div><div class="w-hand">${esc(w.handName)}</div><div class="w-chips">+💰 ${w.chips}</div></div>
  `).join('')||'<div style="color:var(--muted);font-size:0.78rem">Mano terminada</div>';
  if(gs){
    box.innerHTML+=`<div style="margin-top:0.7rem;border-top:1px solid rgba(255,255,255,0.08);padding-top:0.5rem">`+
      gs.players.filter(p=>!p.eliminated).map(p=>
        `<div style="display:flex;justify-content:space-between;font-size:0.68rem;padding:0.12rem 0"><span>${esc(p.name)}</span><span style="color:${p.chips>0?'#7bc47b':'rgba(220,120,120,0.7)'}">💰 ${p.chips}</span></div>`
      ).join('')+`</div>`;
  }
  const btn=document.getElementById('next-btn');
  if(btn){btn.textContent=`✅ Siguiente mano (0/${active})`;btn.disabled=false;}
  document.getElementById('hand-overlay').classList.add('vis');
}

function sendNext(){send({type:'nextHand'});const b=document.getElementById('next-btn');if(b)b.disabled=true;}

function addLog(msg){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-e'+(msg.includes('gana')||msg.includes('ALL-IN')||msg.includes('🏆')?' hl':'');
  d.textContent=msg; el.appendChild(d); el.scrollTop=el.scrollHeight;
}
function addChat(from,msg){
  const el=document.getElementById('chatmsgs');
  el.innerHTML+=`<div class="chat-m"><strong>${esc(from)}:</strong> ${esc(msg)}</div>`;
  el.scrollTop=el.scrollHeight;
}
function sendChat(){const i=document.getElementById('chatinp');const t=i.value.trim();if(!t)return;send({type:'chat',text:t});i.value='';}

function handleMsg(msg){
  if(msg.type==='joined'){
    myId=msg.playerId; myRoom=msg.roomCode;
    document.getElementById('lform').style.display='none';
    document.getElementById('lwait').style.display='block';
    document.getElementById('wcode').textContent=msg.roomCode;
  }
  if(msg.type==='state'){
    gs=msg.state;
    if(msg.state.gameState==='waiting'){
      renderWaiting(msg.state);
    } else {
      document.getElementById('lobby').style.display='none';
      document.getElementById('game').classList.add('active');
      renderGame(msg.state);
      if(msg.state.gameState!=='hand_end') document.getElementById('hand-overlay').classList.remove('vis');
    }
  }
  if(msg.type==='log') addLog(msg.msg);
  if(msg.type==='chat') addChat(msg.from,msg.msg);
  if(msg.type==='hand_end'){
    renderHandEnd(msg);
    notice((msg.winners||[]).map(w=>`🏆 ${w.name} — ${w.handName}`).join(' | ')||'Fin de mano',3500);
  }
  if(msg.type==='ready_count'){
    const b=document.getElementById('next-btn');
    if(b){b.textContent=`✅ Siguiente mano (${msg.count}/${msg.total})`;b.disabled=false;}
  }
  if(msg.type==='game_over'){
    document.getElementById('go-msg').textContent=`${msg.winner} gana con ${msg.chips} fichas`;
    document.getElementById('gameover-overlay').classList.add('vis');
    notice(`🏆 ¡${msg.winner} gana la partida!`,5000);
  }
  if(msg.type==='error') notice('⚠️ '+msg.msg,2500);
}
</script>
</body>
</html>
